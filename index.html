<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="아름답고 심플한 할일 목록(To-Do List) 웹 애플리케이션입니다.">
    <title>Modern To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header>
            <h1>Tasks</h1>
            <p class="subtitle">오늘 할 일을 기록해보세요</p>
        </header>

        <div class="empty-state" id="empty-state">
            <p>등록된 할 일이 없습니다.<br>위에서 새로운 할 일을 추가해보세요!</p>
        </div>

        <ul class="todo-list" id="todo-list">
            <!-- Items will be injected here by JS -->
        </ul>
    </main>

    <!-- 새작업 추가 모달 -->
    <div class="modal-overlay" id="add-modal" tabindex="-1">
        <div class="modal-content">
            <h2>새 작업 추가</h2>
            <form class="input-group modal-form" id="todo-form">
                <input type="text" id="todo-input" placeholder="새로운 할 일 내용..." autocomplete="off">
                <div class="modal-due-row">
                    <label for="todo-due">기한 (선택):</label>
                    <input type="datetime-local" id="todo-due" aria-label="기한 선택">
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-modal-btn" id="close-modal-btn">취소</button>
                    <button type="submit" class="add-btn">목록에 추가</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 완료업무 모달 -->
    <div class="modal-overlay" id="completed-modal" tabindex="-1">
        <div class="modal-content completed-modal-content">
            <div class="completed-modal-header">
                <h2>완료업무</h2>
                <button class="close-completed-btn" id="close-completed-btn" aria-label="닫기">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="completed-list-container">
                <!-- rendered by JS -->
            </div>
        </div>
    </div>

    <!-- 하단 플로팅 버튼 그룹 -->
    <div class="fab-group">
        <button id="open-completed-btn" class="fab-btn secondary" aria-label="완료업무 보기">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
            <span>완료업무</span>
        </button>
        <button id="open-modal-btn" class="fab-btn" aria-label="Add new task">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            <span>새작업 추가</span>
        </button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
