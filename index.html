<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="아름답고 심플한 할일 목록(To-Do List) 웹 애플리케이션입니다.">
    <title>Modern To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --accent-color: #8b5cf6;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            margin: 0.5rem 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            position: relative;
        }

        input[type="text"],
        input[type="datetime-local"] {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"] {
            flex-grow: 1;
            min-width: 200px;
        }

        input[type="datetime-local"] {
            color: var(--text-muted);
            min-width: 150px;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        input[type="text"]:focus,
        input[type="datetime-local"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            color: var(--text-main);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        button.add-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 1.5rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
        }

        button.add-btn:active {
            transform: translateY(0);
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.3s ease;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes scaleOut {
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        .checkbox-container {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-right: 1rem;
        }

        .checkbox-container input {
            opacity: 0;
            position: absolute;
            cursor: pointer;
        }

        .checkmark {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .checkbox-container input:checked ~ .checkmark {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .checkmark::after {
            content: "";
            position: absolute;
            display: none;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark::after {
            display: block;
        }

        .todo-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow: hidden;
        }

        .todo-text {
            font-size: 1rem;
            transition: color 0.3s ease;
            word-break: break-all;
        }

        .todo-due {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 500;
        }

        .todo-due.overdue {
            color: var(--danger-color);
        }

        .todo-item.completed .todo-text,
        .todo-item.completed .todo-due {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: var(--text-muted);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }

        /* 폰에서는 삭제버튼 항상 표시, 데스크탑에서는 hover 시에만 표시 */
        @media (hover: hover) {
            .todo-item:hover .delete-btn {
                opacity: 1;
            }
        }
        
        @media (hover: none) {
            .delete-btn {
                opacity: 1;
            }
        }

        .delete-btn:hover {
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }

        .delete-btn svg {
            width: 18px;
            height: 18px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
            display: none;
        }
        
        .empty-state.visible {
            display: block;
            animation: slideIn 0.4s ease forwards;
        }

        /* Responsiveness */
        @media (max-width: 480px) {
            .app-container {
                border-radius: 0;
                min-height: 100vh;
                margin: 0;
                border: none;
                padding: 2rem 1.5rem;
            }
            background-image: none;
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>Tasks</h1>
            <p class="subtitle">오늘 할 일을 기록해보세요</p>
        </header>

        <form class="input-group" id="todo-form">
            <input type="text" id="todo-input" placeholder="새로운 할 일 추가..." autocomplete="off">
            <input type="datetime-local" id="todo-due" aria-label="기한 선택">
            <button type="submit" class="add-btn">추가</button>
        </form>

        <div class="empty-state" id="empty-state">
            <p>등록된 할 일이 없습니다.<br>위에서 새로운 할 일을 추가해보세요!</p>
        </div>

        <ul class="todo-list" id="todo-list">
            <!-- Items will be injected here by JS -->
        </ul>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlpQVSMkvLTLBJIJDLJuzAiX03eqWvEKE",
            authDomain: "my-todo-app-90eab.firebaseapp.com",
            projectId: "my-todo-app-90eab",
            storageBucket: "my-todo-app-90eab.firebasestorage.app",
            messagingSenderId: "61381291469",
            appId: "1:61381291469:web:a27b4addb3ba228d28e884"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const todosCollectionRef = collection(db, 'todos');

        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');
        const dueInput = document.getElementById('todo-due');
        const list = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');

        let todos = []; // 로컬 데이터 복제본 (UI 렌더링용)

        const deleteIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>';

        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '';
            const options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateTimeStr).toLocaleString('ko-KR', options);
        }

        function isOverdue(dateTimeStr) {
            if (!dateTimeStr) return false;
            return new Date(dateTimeStr) < new Date();
        }

        function renderTodos() {
            list.innerHTML = '';
            
            if (todos.length === 0) {
                emptyState.classList.add('visible');
            } else {
                emptyState.classList.remove('visible');
                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                    li.id = `todo-${todo.id}`;
                    
                    const dueFormatted = formatDateTime(todo.due);
                    const overdueClass = (!todo.completed && isOverdue(todo.due)) ? 'overdue' : '';
                    
                    li.innerHTML = `
                        <label class="checkbox-container">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${todo.id}', ${!todo.completed})">
                            <span class="checkmark"></span>
                        </label>
                        <div class="todo-content">
                            <span class="todo-text">${escapeHTML(todo.text)}</span>
                            ${dueFormatted ? `<span class="todo-due ${overdueClass}">기한: ${escapeHTML(dueFormatted)}</span>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteTodo('${todo.id}')" aria-label="Delete task">
                            ${deleteIcon}
                        </button>
                    `;
                    list.appendChild(li);
                });
            }
        }

        // Firestore 실시간 리스너 추가 (데이터 읽기)
        const q = query(todosCollectionRef, orderBy('createdAt', 'desc'));
        onSnapshot(q, (snapshot) => {
            todos = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderTodos();
        }, (error) => {
            console.error("Error fetching data:", error);
            if (error.code === 'failed-precondition') {
               console.warn("Firestore index might be needed or database is not initialized properly yet.");
            }
        });

        // Firestore 데이터 추가
        async function addTodo(text, due) {
            try {
                await addDoc(todosCollectionRef, {
                    text: text,
                    due: due,
                    completed: false,
                    createdAt: serverTimestamp()
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("할 일을 추가하는데 실패했습니다. Firestore 설정을 확인해주세요.");
            }
        }

        // 전역 스코프에 함수 노출 (모듈 스코프 해결)
        window.toggleTodo = async function(id, newStatus) {
            const todoDoc = doc(db, 'todos', id);
            try {
                await updateDoc(todoDoc, { completed: newStatus });
            } catch (e) {
                console.error("Error updating document: ", e);
            }
        };

        window.deleteTodo = async function(id) {
            const element = document.getElementById(`todo-${id}`);
            if (element) {
                element.style.animation = 'scaleOut 0.3s forwards';
            }
            
            setTimeout(async () => {
                const todoDoc = doc(db, 'todos', id);
                try {
                    await deleteDoc(todoDoc);
                } catch (e) {
                    console.error("Error deleting document: ", e);
                }
            }, 300);
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            const due = dueInput.value;
            if (text !== '') {
                addTodo(text, due);
                input.value = '';
                dueInput.value = ''; 
            }
        });

        setInterval(renderTodos, 60000);

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
