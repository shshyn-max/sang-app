<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY 상품권 관리</title>
    
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#000000">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="view-list">
        <div class="main-header">
            <h2 onclick="location.reload()">MY 상품권 관리</h2>
            <button class="btn-archive-link" onclick="showView('view-archive')">완료내역</button>
        </div>
        <div id="voucher-container"></div>
        <button class="btn-add-voucher" onclick="showAddView()">+ 새 상품권 등록</button>
    </div>

    <div id="view-archive" class="hidden">
        <div class="header-relative">
            <h3>사용완료내역</h3>
            <button class="btn-nav-right" onclick="showView('view-list')">목록으로 ✕</button>
        </div>
        <div id="archive-container"></div>
    </div>

    <div id="view-form" class="hidden">
        <div class="header-relative">
            <h3 id="form-title">상품권 등록</h3>
            <button class="btn-nav-right" onclick="showView('view-list')">취소 ✕</button>
        </div>
        <label>상품권 이름</label>
        <input type="text" id="vName" placeholder="예: 스타벅스 5만원권">
        <label>카테고리</label>
        <select id="vCategory">
            <option value="기타">카테고리 선택</option>
            <option value="커피">커피</option><option value="주유">주유</option><option value="외식">외식</option>
            <option value="쇼핑">쇼핑</option><option value="편의점">편의점</option><option value="생활샵">생활샵</option>
            <option value="페이포인트">페이포인트</option>
        </select>
        <label>이미지</label>
        <div id="imgEditBlock" class="hidden" style="display:flex; align-items:center; margin-bottom: 15px;">
            <img id="vImgPreview" style="width:60px; height:60px; border-radius:8px; margin-right:15px; object-fit:cover; border:1px solid var(--border);">
            <span style="font-size:0.8rem; color:var(--sub-text);">이미지 변경 시 우측 선택</span>
        </div>
        <input type="file" id="vImg" accept="image/*">
        <label>전체 금액 (원)</label>
        <input type="number" id="vTotal" placeholder="금액 입력" inputmode="numeric">
        <label>유효기간</label>
        <input type="date" id="vExpiry">
        <button class="btn-white" id="btnSaveVoucher" onclick="saveVoucher()" style="margin-top:10px;">저장하기</button>
    </div>

    <div id="view-detail" class="hidden">
        <div class="header-relative">
            <h3 id="detailHeaderTitle">사용내역 입력</h3>
            <button class="btn-nav-right" onclick="showView('view-list')">목록으로 ✕</button>
        </div>
        <div class="usage-form" style="padding-top: 10px;">
            <label>사용날짜</label>
            <input type="date" id="useDate">
            <label>금액입력</label>
            <input type="number" id="useAmount" placeholder="금액을 입력해 주세요" inputmode="numeric">
            <button class="btn-white" id="btnAddHistory" onclick="addHistory()" style="margin-top: 20px;">기록 저장</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="main.js"></script>
</body>
</html>
